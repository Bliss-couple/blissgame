<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>블리스 게임</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-glow: 0 0 60px rgba(0,123,255,0.6), 0 0 120px rgba(0,123,255,0.2);
            --pink-glow: 0 0 60px rgba(255,20,147,0.6), 0 0 120px rgba(255,20,147,0.2);
            --red-glow:  0 0 60px rgba(255,0,0,0.7),   0 0 140px rgba(255,0,0,0.3);
            --card-w: min(75vw, 300px);
            --card-h: calc(var(--card-w) * 1.533);
            --font-mission: clamp(16px, 4.5vw, 22px);
            --font-icon: clamp(48px, 14vw, 72px);
            --current-color: rgba(0,123,255,1);
            --current-glow: var(--blue-glow);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; }
        body {
            background: #060608;
            color: white;
            font-family: 'Noto Serif KR', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        #brand {
            position: fixed; top: 28px;
            font-size: clamp(9px, 2.5vw, 11px);
            color: #333; letter-spacing: 3px;
            text-transform: uppercase; z-index: 10;
        }
        #phase-badge {
            position: fixed; top: 55px;
            font-size: clamp(9px, 2.2vw, 10px);
            letter-spacing: 3px; color: #333;
            text-transform: uppercase; z-index: 10; transition: color 0.6s;
        }
        #phase-badge.main { color: #ff1493; }

        #game-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        /* 타이머 영역 (카드 위) */
        #timer-wrap {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            height: 60px;
        }
        #timer-wrap.visible { opacity: 1; pointer-events: auto; }

        #timer-btn {
            width: 48px; height: 48px;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        #timer-btn.running {
            border-color: var(--current-color);
            background: rgba(255,255,255,0.07);
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(var(--current-rgb), 0.5); }
            70%  { box-shadow: 0 0 0 10px rgba(var(--current-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--current-rgb), 0); }
        }

        #timer-display {
            font-weight: 700;
            letter-spacing: 1px;
            min-width: 120px;
            transition: all 0.2s ease;
            text-align: left;
        }
        #timer-display.idle {
            font-size: 14px;
            color: rgba(255,255,255,0.6); /* 기본 흰색 계열 */
            text-shadow: none;
        }
        #timer-display.running {
            font-size: 28px;
            color: var(--current-color);
            text-shadow: var(--current-glow);
            font-variant-numeric: tabular-nums;
        }
        #timer-display.warning {
            color: #ff4444;
            text-shadow: 0 0 15px rgba(255,60,60,0.8);
        }

        /* 카드 */
        .card-container {
            width: var(--card-w); height: var(--card-h);
            perspective: 2000px; cursor: pointer;
        }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-radius: clamp(18px, 6vw, 28px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; inset: 0; border-radius: inherit;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 30px;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
        }
        .back { transition: box-shadow 0.6s, background 0.6s; }
        .back.lv-low  { background: linear-gradient(145deg, #001528, #003580, #0055cc); }
        .back.lv-mid  { background: linear-gradient(145deg, #1a0020, #6b0050, #cc0070); }
        .back.lv-high { background: linear-gradient(145deg, #1a0000, #7a0000, #cc0000); }
        .card-icon { font-size: var(--font-icon); opacity: 0.25; }
        .card-level-text {
            position: absolute; bottom: 24px;
            font-size: 10px; letter-spacing: 4px;
            color: rgba(255,255,255,0.4); font-weight: 700;
        }
        .front {
            background: #0d0d12; transform: rotateY(180deg);
            text-align: center; gap: 12px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        #mission-text {
            font-size: var(--font-mission); font-weight: 700;
            line-height: 1.75; color: #ffffff; word-break: keep-all;
        }

        /* 진행 점 (카드 아래) */
        #progress-wrap {
            display: flex; gap: 6px; flex-wrap: wrap;
            justify-content: center; max-width: 90vw; margin-top: 10px;
            height: 10px; /* 높이 고정하여 사라질 때 레이아웃 유지 */
        }
        .prog-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: #222; transition: 0.4s;
        }
        .prog-dot.done { background: #555; }
        .prog-dot.active { background: #aaa; transform: scale(1.4); }

        #guide-text {
            position: fixed; bottom: 30px;
            font-size: 12px; color: #444;
        }

        #end-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center; flex-direction: column;
            z-index: 20; backdrop-filter: blur(5px);
        }
        #end-overlay.visible { display: flex; }
    </style>
</head>
<body>

<div id="brand">PRODUCED BY @BLISSCOUPLE</div>
<div id="phase-badge">WARMING UP</div>

<div id="game-stack">
    <div id="timer-wrap">
        <div id="timer-btn" onclick="handleTimer(event)">⏳</div>
        <div id="timer-display" class="idle">탭하면 시간 배정</div>
    </div>

    <div class="card-container" onclick="handleCardInteraction()">
        <div id="card" class="card">
            <div id="card-back" class="card-face back lv-low">
                <span class="card-icon">♠</span>
                <span class="card-level-text">Lv.1</span>
            </div>
            <div class="card-face front">
                <p id="mission-text"></p>
            </div>
        </div>
    </div>

    <div id="progress-wrap"></div>
</div>

<div id="guide-text">카드를 터치하여 확인하세요</div>

<div id="end-overlay" onclick="resetGame()">
    <h2>🎉 모든 미션 완료</h2>
    <p>터치하면 처음으로 돌아갑니다</p>
</div>

    { level: 4, text: "목소리가 새어 나오지 못하게\n입술을 강하게 압박하며 키스하기", type: "본게임" },
    { level: 4, text: "눈을 감고 오직 혀의 감각에만\n집중하며 아주 천천히 딥키스하기", type: "본게임" },

    { level: 5, text: "가슴 아래 라인을 따라 혀로 훑으며\n천천히 유두까지 올라오기", type: "피날레" },

    // --- 하반신 & 민감 부위 (Level 5 / 피날레) ---
    { level: 5, text: "성기 입구 주변 여린 살들을\n혀로 부드럽게 핥아 올리기", type: "피날레" },
    { level: 5, text: "클리토리스를 입술로 머금고\n혀를 빠르게 움직여 진동 주기", type: "피날레" },
    { level: 5, text: "남자의 기둥 핏줄을 따라\n아래에서 위로 길게 핥아주기", type: "피날레" },
    { level: 5, text: "성기 입구에 손가락 하나를 넣고\n입으로는 허벅지 안쪽 깨물기", type: "피날레" },
    { level: 5, text: "남자의 머리 부분을 입안 가득 넣고\n혀로 굴리며 자극하기", type: "피날레" },
    { level: 5, text: "성기 입구를 혀로 깊게 찌르듯\n자극하며 신음 유도하기", type: "피날레" },
    { level: 5, text: "클리토리스를 엄지와 검지로\n가볍게 꼬집으며 반응 살피기", type: "피날레" },
    { level: 5, text: "남자의 뿌리 부분부터 끝까지\n입술로 천천히 훑어내리기", type: "피날레" },
    { level: 5, text: "성기 입구 주위에 침을 충분히 묻히고\n혀로 원 그리기", type: "피날레" },
    { level: 5, text: "클리토리스를 혀끝으로 튕기며\n동시에 손가락 두 개를 삽입하기", type: "피날레" },

    // --- 엉덩이 & 체위 (Level 4~5 / 본게임 & 피날레) ---
    { level: 4, text: "양손으로 엉덩이 살을 가득 움켜쥐고\n자기 쪽으로 강하게 밀착하기", type: "본게임" },
    { level: 4, text: "엉덩이 한쪽을 찰싹 때린 후\n붉어진 자국 위에 진하게 입 맞추기", type: "본게임" },
    { level: 5, text: "엉덩이 사이 골을 따라 혀로\n아래에서 위로 길게 훑기", type: "피날레" },
    { level: 4, text: "맨살 엉덩이 밑부분을 살짝 깨물고\n손바닥으로 마사지하기", type: "본게임" },
    { level: 5, text: "엉덩이를 양옆으로 벌리고\n입술로 성기 입구 근처까지 자극하기", type: "피날레" },
    { level: 3, text: "여자가 남자의 허벅지 위에 마주 보고\n앉아 서로의 심장 소리 느끼기", type: "본게임" },
    { level: 4, text: "뒤에서 상대를 꽉 껴안고\n목덜미와 귓볼을 혀로 간지럽히기", type: "본게임" },

    { level: 5, text: "상대를 무릎 위에 앉히고 가슴을\n뒤에서 감싸 안으며 유두 만지기", type: "피날레" },

    // --- 전신 애무 & 분위기 (Level 3~4 / 본게임) ---
    { level: 3, text: "상대방의 배꼽 주위를 혀로\n간지럽히며 점점 아래로 내려가기", type: "본게임" },
    { level: 4, text: "쇄골 라인을 따라 혀로 훑고\n움푹 파인 곳에 깊은 키스 마크 남기기", type: "본게임" },
    { level: 3, text: "상대방의 귀에 뜨거운 숨을\n불어넣으며 혀로 귓바퀴 핥기", type: "본게임" },
    { level: 4, text: "목덜미의 가장 예민한 부분을 찾아\n입술로 강하게 빨아들이기", type: "본게임" },
    { level: 3, text: "상대방의 손가락을 하나씩 입에 넣고\n혀로 감싸며 빨아주기", type: "본게임" }

        
    ];

    const WARMUP = ALL_MISSIONS.filter(m => m.type === "워밍업");
    const MAIN   = ALL_MISSIONS.filter(m => m.type === "본게임");

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, duration, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    let queue=[], idx=0, total=10, flipped=false, gameOver=false, isMain=false;
    let timerInterval = null, timerRemaining = 0, timerRunning = false;

    function initGame() {
        isMain=false; gameOver=false; flipped=false; idx=0;
        queue = [...WARMUP].sort(() => Math.random() - 0.5);
        total = 10; // 워밍업 점 10개 고정
        stopTimer();
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('end-overlay').classList.remove('visible');
        document.getElementById('phase-badge').innerText = 'WARMING UP';
        document.getElementById('phase-badge').className = '';
        buildDots();
        setTheme(queue[0]);
    }

    function buildDots() {
        const wrap = document.getElementById('progress-wrap');
        wrap.innerHTML = '';
        if (isMain) return; // 본 게임이면 점을 만들지 않음
        
        for (let i = 0; i < total; i++) {
            const d = document.createElement('div');
            d.className = 'prog-dot' + (i === 0 ? ' active' : '');
            wrap.appendChild(d);
        }
    }

    function setTheme(m) {
        const back = document.getElementById('card-back');
        const root = document.documentElement;
        const lv = m.level;
        const type = lv<=2 ? 'low' : lv<=3 ? 'mid' : 'high';
        const colors = { low: ["0,123,255", "rgba(0,123,255,1)"], mid: ["255,20,147", "rgba(255,20,147,1)"], high: ["255,0,0", "rgba(255,0,0,1)"] };
        root.style.setProperty('--current-rgb', colors[type][0]);
        root.style.setProperty('--current-color', colors[type][1]);
        root.style.setProperty('--current-glow', `0 0 15px ${colors[type][1]}`);
        back.className = 'card-face back lv-' + type;
        back.querySelector('.card-level-text').innerText = 'Lv.' + lv;
    }

    function handleCardInteraction() {
        if (gameOver) return;
        const card = document.getElementById('card');
        if (!flipped) {
            document.getElementById('mission-text').innerText = queue[idx].text;
            flipped = true; card.classList.add('flipped');
            showTimer();
        } else {
            flipped = false; card.classList.remove('flipped');
            stopTimer(); hideTimer();
            setTimeout(() => {
                idx++;
                if (!isMain && idx >= queue.length) {
                    isMain = true; queue = [...MAIN].sort(() => Math.random() - 0.5);
                    idx = 0; 
                    buildDots(); // 본게임 진입 시 점 제거 로직 포함됨
                    document.getElementById('phase-badge').innerText = 'MAIN GAME';
                    document.getElementById('phase-badge').className = 'main';
                }
                if (idx < queue.length) {
                    setTheme(queue[idx]);
                    if (!isMain) {
                        document.querySelectorAll('.prog-dot').forEach((d, i) => {
                            d.className = 'prog-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
                        });
                    }
                } else {
                    gameOver = true; document.getElementById('end-overlay').classList.add('visible');
                }
            }, 650);
        }
    }

    function handleTimer(e) {
        e.stopPropagation();
        if (timerRunning) { stopTimer(); showTimer(); }
        else {
            const opts = [60, 90, 120, 150, 180];
            timerRemaining = opts[Math.floor(Math.random()*opts.length)];
            document.getElementById('timer-display').className = 'running';
            startTimer();
        }
    }

    function startTimer() {
        timerRunning = true;
        document.getElementById('timer-btn').className = 'running';
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timerRemaining--;
            updateTimerDisplay();
            if (timerRemaining <= 10 && timerRemaining > 0) {
                document.getElementById('timer-display').className = 'running warning';
                playBeep(440, 0.1, 0.05);
            }
            if (timerRemaining <= 0) {
                stopTimer();
                document.getElementById('timer-btn').className = 'done';
                document.getElementById('timer-display').innerText = '종료!';
                playBeep(880, 0.5, 0.2);
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(timerRemaining/60), s = timerRemaining%60;
        document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function stopTimer() { clearInterval(timerInterval); timerRunning = false; }
    function showTimer() {
        document.getElementById('timer-wrap').classList.add('visible');
        document.getElementById('timer-display').className = 'idle';
        document.getElementById('timer-display').innerText = '탭하면 시간 배정';
    }
    function hideTimer() { document.getElementById('timer-wrap').classList.remove('visible'); }
    function resetGame() { initGame(); }

    initGame();
</script>
</body>
</html>
