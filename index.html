<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>블리스 게임</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-glow: 0 0 60px rgba(0,123,255,0.6), 0 0 120px rgba(0,123,255,0.2);
            --pink-glow: 0 0 60px rgba(255,20,147,0.6), 0 0 120px rgba(255,20,147,0.2);
            --red-glow:  0 0 60px rgba(255,0,0,0.7),   0 0 140px rgba(255,0,0,0.3);
            --gold-glow: 0 0 60px rgba(255,215,0,0.5), 0 0 120px rgba(255,215,0,0.2);
            
            --card-w: min(75vw, 300px);
            --card-h: calc(var(--card-w) * 1.533);
            --font-mission: clamp(15px, 4.2vw, 20px);
            --font-icon: clamp(48px, 14vw, 72px);
            --current-color: rgba(0,123,255,1);
            --current-glow: var(--blue-glow);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; }
        body {
            background: #060608;
            color: white;
            font-family: 'Noto Serif KR', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* [추가] 비밀번호 입력 전 화면 가리기용 컨테이너 */
        #main-container {
            display: none; /* 비밀번호 인증 전에는 숨김 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* 하단 문구 영역 */
        #guide-area {
            position: fixed;
            bottom: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        /* [수정] 눈 감기 문구 - 글로우 효과를 선명하고 자연스럽게 */
        #close-eyes-text {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            /* 더 또렷하고 자연스러운 흰색 네온 글로우 */
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.9), 
                         0 0 12px rgba(255, 255, 255, 0.5);
            opacity: 0.9;
        }

        #guide-text {
            font-size: 12px;
            color: #444;
        }

        #brand {
            position: fixed; 
            top: 28px;
            font-size: clamp(10px, 2.8vw, 12px);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase; 
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 
                         0 0 20px rgba(255, 255, 255, 0.4);
            opacity: 0.9;
        }
        #phase-badge {
            position: fixed; top: 55px;
            font-size: clamp(9px, 2.2vw, 10px);
            letter-spacing: 3px; color: #333;
            text-transform: uppercase; z-index: 10; transition: color 0.6s;
        }
        #phase-badge.main { color: #ff1493; }
        #game-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        #timer-wrap {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            height: 60px;
        }
        #timer-wrap.visible { opacity: 1; pointer-events: auto; }
        #timer-btn {
            width: 48px; height: 48px;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        #timer-btn.running {
            border-color: var(--current-color);
            background: rgba(255,255,255,0.07);
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(var(--current-rgb), 0.5); }
            70%  { box-shadow: 0 0 0 10px rgba(var(--current-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--current-rgb), 0); }
        }
        #timer-display {
            font-weight: 700;
            letter-spacing: 1px;
            min-width: 120px;
            transition: all 0.2s ease;
            text-align: left;
        }
        #timer-display.idle {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            text-shadow: none;
        }
        #timer-display.running {
            font-size: 28px;
            color: var(--current-color);
            text-shadow: var(--current-glow);
            font-variant-numeric: tabular-nums;
        }
        #timer-display.warning {
            color: #ff4444;
            text-shadow: 0 0 15px rgba(255,60,60,0.8);
        }
        .card-container {
            width: var(--card-w); height: var(--card-h);
            perspective: 2000px; cursor: pointer;
        }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-radius: clamp(18px, 6vw, 28px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; inset: 0; border-radius: inherit;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 30px;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
        }
        .back { transition: box-shadow 0.6s, background 0.6s; }
        
        /* --- 레벨별 배경색 --- */
        .back.lv-low    { background: linear-gradient(145deg, #001528, #003580, #0055cc); }
        .back.lv-purple { background: linear-gradient(145deg, #1a0033, #4b0082, #8a2be2); }
        .back.lv-pink   { background: linear-gradient(145deg, #2a0010, #8b0040, #ff1493); }
        .back.lv-high   { background: linear-gradient(145deg, #1a0000, #7a0000, #cc0000); }
        
        /* --- [추가] 스페셜 골드 카드 배경 --- */
        .back.lv-gold {
            background: linear-gradient(145deg, #000000 0%, #1a1a1a 45%, #b8860b 85%, #ffd700 100%);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .back.lv-gold .card-icon {
            color: #ffd700;
            opacity: 0.7;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }
        .back.lv-gold .card-level-text {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .card-icon { font-size: var(--font-icon); opacity: 0.25; }
        .card-level-text {
            position: absolute; bottom: 24px;
            font-size: 10px; letter-spacing: 4px;
            color: rgba(255,255,255,0.4); font-weight: 700;
        }
        .front {
            background: #0d0d12; transform: rotateY(180deg);
            text-align: center; gap: 12px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        #mission-text {
            font-size: var(--font-mission); font-weight: 700;
            line-height: 1.5;
            color: #ffffff; word-break: keep-all;
            padding: 0 10px;
        }
        #progress-wrap {
            display: flex; gap: 6px; flex-wrap: wrap;
            justify-content: center; max-width: 90vw; margin-top: 10px;
            height: 10px;
        }
        .prog-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: #222; transition: 0.4s;
        }
        .prog-dot.done { background: #555; }
        .prog-dot.active { background: #aaa; transform: scale(1.4); }
        
        #end-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center; flex-direction: column;
            z-index: 20; backdrop-filter: blur(5px);
        }
        #end-overlay.visible { display: flex; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="brand">PRODUCED BY @BLISS_COUPLE</div>
    <div id="phase-badge">WARMING UP</div>

    <div id="game-stack">
        <div id="timer-wrap">
            <div id="timer-btn" onclick="handleTimer(event)">⏳</div>
            <div id="timer-display" class="idle">탭하면 시간 배정</div>
        </div>

        <div class="card-container" onclick="handleCardInteraction()">
            <div id="card" class="card">
                <div id="card-back" class="card-face back lv-low">
                    <span class="card-icon">♠</span>
                    <span class="card-level-text">Lv.1</span>
                </div>
                <div class="card-face front">
                    <p id="mission-text"></p>
                </div>
            </div>
        </div>

        <div id="progress-wrap"></div>
    </div>

    <div id="guide-area">
        <p id="close-eyes-text">미션에 걸린 팀은 눈을 감아주세요</p>
        <p id="guide-text">카드를 터치하여 확인하세요</p>
    </div>

    <div id="end-overlay" onclick="resetGame()">
        <h2>🎉 모든 미션 완료</h2>
        <p>터치하면 처음으로 돌아갑니다</p>
    </div>
</div>

<script>
    // [추가] 비밀번호 설정 (원하는 비밀번호로 바꾸세요)
    const GAME_PASSWORD = "11250716";

    // [추가] 접속 시 비밀번호 확인 함수
    function checkAccess() {
        // 프롬프트 창으로 비밀번호 입력받음
        const entry = prompt("비밀번호를 입력해야 게임을 시작할 수 있습니다.");
        
        if (entry === GAME_PASSWORD) {
            // 비밀번호가 맞으면
            alert("환영합니다, Kang PD님!");
            // 게임 화면 컨테이너 표시
            document.getElementById('main-container').style.display = 'flex';
            // 게임 초기화 및 시작
            initGame(); 
        } else {
            // 비밀번호가 틀리면
            alert("비밀번호가 틀렸습니다. 접근 권한이 없습니다.");
            // 화면에 차단 메시지 표시
            document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:100px;'>접근이 차단되었습니다.<br>페이지를 새로고침하여 다시 시도하세요.</h1>";
        }
    }

    const ALL_MISSIONS = [

// [Lv.1] 가벼운 스킨십 및 인사 (워밍업)----------------------------------------------------------------------------
        { level: 1, text: "서로 하이파이브 하기", type: "워밍업" },

        { level: 1, text: "악수하며 반갑습니다\n외치기", type: "워밍업" },


// [Lv.2] 밀착 및 다정한 신체 접촉 (워밍업)-------------------------------------------------------------------------

        { level: 2, text: "서로 뽀뽀 하기", type: "워밍업" },
        { level: 2, text: "어깨동무 하고 있기", type: "워밍업" },
        { level: 2, text: "허벅지에 손 올려놓기", type: "워밍업" },
        { level: 2, text: "깎지손으로 잡고있기", type: "워밍업" },
        { level: 2, text: "허리에 손 두르기", type: "워밍업" },
        { level: 2, text: "남자의 가슴에 손 얹기", type: "워밍업" },
        { level: 2, text: "어깨에 기대기", type: "워밍업" },


// [Lv.3] 적극적인 애무 및 키스 (본게임)------------------------------------------------------------------------------
    
        { level: 3, text: "상대방의 입안에서\n부드럽게 혀 섞기", type: "본게임" },
        { level: 3, text: "상대방의 입술 주변을 혀로\n한 바퀴 핥은 뒤 진하게 입 맞추기", type: "본게임" },
        { level: 3, text: "키스하면서 손으로는 상대방의\n머리카락을 부드럽게 움켜쥐기", type: "본게임" },
        { level: 3, text: "슬립 위로 가슴 만지기", type: "본게임" },
        { level: 3, text: "가슴 애무하기", type: "본게임" },
        { level: 3, text: "한쪽 유두는 입으로 애무,\n다른 쪽 유두는 손가락으로 비틀기", type: "본게임" },
        { level: 3, text: "5번의 게임 끝날때까지\n손으로 한쪽가슴 애무", type: "본게임" },
        { level: 3, text: "1번의 게임이 끝날때까지\n상대 무릎위에 마주보고 앉아있기", type: "본게임" },
        { level: 3, text: "양손으로 엉덩이 살을 가득 움켜쥐고\n자기 쪽으로 강하게 밀착하기", type: "본게임" },
        { level: 3, text: "맨살 엉덩이 밑부분을 살짝 깨물고\n손바닥으로 마사지하기", type: "본게임" },
        { level: 3, text: "여자가 남자의 허벅지 위에 마주 보고\n앉아 서로의 심장 소리 느끼기", type: "본게임" },
        { level: 3, text: "뒤에서 상대를 꽉 껴안고\n목덜미와 귓볼을 혀로 간지럽히기", type: "본게임" },
        { level: 3, text: "여자가 남자의 무릎 위에 앉아\n 남자 자극시키기", type: "본게임" },
        { level: 3, text: "서로를 마주 안은 상태에서\n 심장소리 느끼기", type: "본게임" },
        { level: 3, text: "여자가 남자의 허벅지 위에서\n가슴으로 안아주기", type: "본게임" },
        { level: 3, text: "상대를 무릎 위에 앉히고 가슴을\n뒤에서 감싸 안으며 유두 만지기", type: "본게임" },
        { level: 3, text: "상대방의 배꼽 주위를 혀로\n간지럽히며 점점 아래로 내려가기", type: "본게임" },
        { level: 3, text: "쇄골 라인을 따라 혀로 훑고\n가슴 으로 내려가서 애무하기", type: "본게임" },
        { level: 3, text: "상대방의 귀에 뜨거운 숨을\n불어넣으며 혀로 귓바퀴 핥기", type: "본게임" },
        { level: 3, text: "목덜미의 가장 예민한 부분을 찾아\n입으로 애무하기", type: "본게임" },
        { level: 3, text: "옷속으로 손 넣기", type: "본게임" },
        { level: 3, text: "3게임 진행동안 옷 위로 성기 만지기", type: "본게임" },
        { level: 3, text: "3게임 진행동안 옷 위로 가슴 만지기", type: "본게임" },


// [Lv.4] 자극적인 딥키스 및 신체 접촉 (본게임)-----------------------------------------------------------------------

        { level: 4, text: "여자가 남자위에 올라가\n자극하다가 갑자기 깊게 키스하기", type: "본게임" },
        { level: 4, text: "일어서서 꽉 끌어안은 채로\n입술을 강하게 압박하며 키스하기", type: "본게임" },
        { level: 4, text: "여자손 남자소중이 남자손 가슴 \n만지며 딥키스하기", type: "본게임" },
        { level: 4, text: "여자를 벽에 밀착해서 키스하면서 \n여자 밑에 만지기", type: "본게임" },
        { level: 4, text: "엉덩이 만지면서 가슴 애무하기", type: "본게임" },
        { level: 4, text: "남자 소중이 만지면서 \n남자 가슴 애무", type: "본게임" },
        { level: 4, text: "성기 입구 주변 여린 살들을\n혀로 부드럽게 핥아 올리기", type: "본게임" },
        { level: 4, text: "남자의 다리 사이에 여자가 앉아 등을 맞대고\n목을 뒤로 젖혀 키스하기", type: "본게임" },
        { level: 4, text: "파트너의 윗입술과 아랫입술을\n번갈아 깨물며 진하게 키스하기", type: "본게임" },
        { level: 4, text: "키스 도중 상대방의 아랫입술을\n가볍게 잡아당겼다 놓으며 자극하기", type: "본게임" },


// [Lv.5] 직접적인 성적 자극 (피날레)-------------------------------------------------------------------------------------

        { level: 5, text: "남자의 귀두를 입안 가득 넣고\n혀로 굴리며 자극하기", type: "피날레" },
        { level: 5, text: "남자성기 입구를 혀로 깊게 찌르듯\n자극하며 신음 유도하기", type: "피날레" },
        { level: 5, text: "여자 성기 입구 주위를 애무하기", type: "피날레" },
        { level: 5, text: "클리토리스를 혀끝으로 튕기며\n동시에 손가락 두 개를 삽입하기", type: "피날레" },
        { level: 5, text: "클리토리스 애무", type: "피날레" },
        { level: 5, text: "여자성기 입구에 손가락 하나를 넣고\n입으로는 허벅지 애무", type: "피날레" },
        { level: 5, text: "클리토리스를 손으로 살살 애무하기", type: "피날레" },


    ];

    const HIDDEN_MISSIONS = [
// [Lv.6] 직접적인 삽입 -------------------------------------------------------------------------------------
        { level: 6, text: "여자는 남자 허벅지위에 올라타\n삽입하기", type: "히든" },
        { level: 6, text: "남자는 여자 뒤에서\n삽입하기", type: "히든" }
    ];

    const WARMUP = ALL_MISSIONS.filter(m => m.type === "워밍업");
    const MAIN_POOL = ALL_MISSIONS.filter(m => m.type === "본게임" || m.type === "피날레");

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, duration, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    let queue=[], idx=0, total=10, flipped=false, gameOver=false, isMain=false;
    let timerInterval = null, timerRemaining = 0, timerRunning = false;
    let mainMissionPool = []; 
    let lv5Counter = 0;

    function initGame() {
        isMain=false; gameOver=false; flipped=false; idx=0; lv5Counter = 0;
        queue = [...WARMUP].sort(() => Math.random() - 0.5).slice(0, 10);
        mainMissionPool = [];
        stopTimer();
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('end-overlay').classList.remove('visible');
        document.getElementById('phase-badge').innerText = 'WARMING UP';
        document.getElementById('phase-badge').className = '';
        buildDots();
        setTheme(queue[0]);
    }

    function buildDots() {
        const wrap = document.getElementById('progress-wrap');
        wrap.innerHTML = '';
        if (isMain) return;
        for (let i = 0; i < 10; i++) {
            const d = document.createElement('div');
            d.className = 'prog-dot' + (i === 0 ? ' active' : '');
            wrap.appendChild(d);
        }
    }

    function setTheme(m) {
        const back = document.getElementById('card-back');
        const root = document.documentElement;
        const lv = m.level;
        
        let type = 'low';
        if (lv === 3) type = 'purple';
        if (lv === 4) type = 'pink';
        if (lv === 5) type = 'high';
        if (m.type === "히든") type = 'gold'; 
        
        const colors = { 
            low:    ["0,123,255", "rgba(0,123,255,1)"],
            purple: ["138,43,226", "rgba(138,43,226,1)"],
            pink:   ["255,20,147", "rgba(255,20,147,1)"],
            high:   ["255,0,0", "rgba(255,0,0,1)"],
            gold:   ["255,215,0", "rgba(255,215,0,1)"] 
        };

        root.style.setProperty('--current-rgb', colors[type][0]);
        root.style.setProperty('--current-color', colors[type][1]);
        
        if (type === 'gold') {
            root.style.setProperty('--current-glow', `var(--gold-glow)`);
        } else {
            root.style.setProperty('--current-glow', `0 0 15px ${colors[type][1]}`);
        }
        
        back.className = 'card-face back lv-' + type;
        back.querySelector('.card-level-text').innerText = (m.type === "히든" ? "SPECIAL" : 'Lv.' + lv);
    }

    function handleCardInteraction() {
        if (gameOver) return;
        const card = document.getElementById('card');
        const textElement = document.getElementById('mission-text');
        
        if (!flipped) {
            let currentMission = queue[idx];
            
            if (currentMission.type === "히든") {
                textElement.style.color = "#ffd700"; 
                textElement.style.fontSize = "calc(var(--font-mission) * 0.85)";
                textElement.innerText = "[SPECIAL MISSION]\n" + currentMission.text;
            } else {
                textElement.style.color = "#ffffff";
                textElement.style.fontSize = "var(--font-mission)";
                textElement.innerText = currentMission.text;
            }

            flipped = true; card.classList.add('flipped');
            showTimer();
        } else {
            flipped = false; card.classList.remove('flipped');
            stopTimer(); hideTimer();
            setTimeout(() => {
                idx++;
                
                if (!isMain && idx >= 10) {
                    isMain = true;
                    idx = 0;
                    document.getElementById('phase-badge').innerText = 'MAIN GAME';
                    document.getElementById('phase-badge').className = 'main';
                    buildDots();
                }

                if (isMain) {
                    if (mainMissionPool.length === 0) {
                        mainMissionPool = [...MAIN_POOL].sort(() => Math.random() - 0.5);
                    }
                    
                    let nextMission = mainMissionPool.pop();

                    if (nextMission.level === 5) {
                        lv5Counter++;
                        if (lv5Counter % 10 === 0) {
                            nextMission = {...HIDDEN_MISSIONS[Math.floor(Math.random()*HIDDEN_MISSIONS.length)]};
                        }
                    }
                    
                    queue[idx] = nextMission;
                }

                setTheme(queue[idx]);
                if (!isMain) {
                    document.querySelectorAll('.prog-dot').forEach((d, i) => {
                        d.className = 'prog-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
                    });
                }
            }, 650);
        }
    }

    function handleTimer(e) {
        e.stopPropagation();
        if (timerRunning) { stopTimer(); showTimer(); }
        else {
            const opts = [60, 90, 120];
            timerRemaining = opts[Math.floor(Math.random()*opts.length)];
            document.getElementById('timer-display').className = 'running';
            startTimer();
        }
    }

    function startTimer() {
        timerRunning = true;
        document.getElementById('timer-btn').className = 'running';
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timerRemaining--;
            updateTimerDisplay();
            if (timerRemaining <= 10 && timerRemaining > 0) {
                document.getElementById('timer-display').className = 'running warning';
                playBeep(440, 0.1, 0.05);
            }
            if (timerRemaining <= 0) {
                stopTimer();
                document.getElementById('timer-btn').className = 'done';
                document.getElementById('timer-display').innerText = '종료!';
                playBeep(880, 0.5, 0.2);
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(timerRemaining/60), s = timerRemaining%60;
        document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function stopTimer() { clearInterval(timerInterval); timerRunning = false; }
    function showTimer() {
        document.getElementById('timer-wrap').classList.add('visible');
        document.getElementById('timer-display').className = 'idle';
        document.getElementById('timer-display').innerText = '탭하면 시간 배정';
    }
    function hideTimer() { document.getElementById('timer-wrap').classList.remove('visible'); }
    function resetGame() { initGame(); }

    // [수정된 부분] 초기화 대신 비밀번호 확인 함수 호출
    checkAccess(); 
</script>
</body>
